name: Build Windows app

# Builds a standalone TokenCounter.exe (and an .msi) on GitHub's Windows
# runners, so neither you nor your friends need Python installed. The .exe and
# .msi are built in SEPARATE jobs so a failure in one never blocks the other,
# and uploads use `if: always()` so you always get whatever built. Download from
# the run's "Artifacts" section, or from a tagged Release.

on:
  push:
    branches: ["**"]
  workflow_dispatch: {}
  release:
    types: [created]

jobs:
  exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # so `git rev-parse` can stamp the commit
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller
      - name: Stamp build (version + commit)
        run: python tools/stamp_build.py
      - name: Generate icon
        run: python -m token_counter icon icon.ico
      - name: Build standalone .exe (clean)
        run: >
          python -m PyInstaller --clean --noconfirm --noconsole --onefile
          --name tokn --paths src
          --icon icon.ico --version-file version_info.txt
          --collect-all pystray --collect-all PIL --collect-all keyring
          --collect-data token_counter
          --collect-all webview --collect-all clr_loader --collect-all pythonnet
          --hidden-import clr --hidden-import clr_loader
          run_token_counter.py
      - name: Upload .exe
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tokn-exe
          path: dist/tokn.exe
          if-no-files-found: warn
      - name: Attach .exe to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tokn.exe

  msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install cx_Freeze
      - name: Stamp build (version + commit)
        run: python tools/stamp_build.py
      - name: Generate icon
        run: python -m token_counter icon icon.ico
      - name: Build .msi installer
        run: python setup_msi.py bdist_msi
      - name: Upload .msi
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tokn-msi
          path: dist/*.msi
          if-no-files-found: warn
      - name: Attach .msi to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi
