name: Build Windows app

# Builds a standalone TokenCounter.exe (and .msi) on GitHub's Windows runners,
# so neither you nor your friends need Python installed. Download the result
# from the run's "Artifacts" section, or attach it to a tagged release.

on:
  push:
    branches: ["**"]
  workflow_dispatch: {}
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pyinstaller cx_Freeze

      - name: Generate icon
        run: python -m token_counter icon icon.ico

      - name: Build standalone .exe
        run: >
          python -m PyInstaller --noconsole --onefile --name TokenCounter --paths src
          --icon icon.ico --version-file version_info.txt
          --collect-all pystray --collect-all PIL --collect-all keyring
          run_token_counter.py

      - name: Build .msi installer
        run: python setup_msi.py bdist_msi

      - name: Upload the .exe
        uses: actions/upload-artifact@v4
        with:
          name: TokenCounter-exe
          path: dist/TokenCounter.exe

      - name: Upload the .msi
        uses: actions/upload-artifact@v4
        with:
          name: TokenCounter-msi
          path: dist/*.msi

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/TokenCounter.exe
            dist/*.msi
