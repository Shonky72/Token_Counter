# Token Counter configuration.
# Copy this to ~/.token_counter/config.yaml and edit it.

# How often the tray refreshes (seconds). 30 = "live within 30s".
refresh_seconds: 30

# Launch Token Counter automatically when Windows starts. Can also be toggled
# from the tray menu / Settings; the app keeps this flag in sync.
open_on_startup: false

# Which window the tray icon opens on click: "dashboard" or "compact".
view_mode: dashboard

# Local usage ledger + captured rate-limit snapshots (SQLite).
ledger_path: "~/.token_counter/ledger.db"

# Local endpoint your code forwards usage + rate-limit headers to.
server:
  enabled: true
  host: "127.0.0.1"
  port: 8787

providers:
  # --- Claude: provider-ENFORCED rate limits, read live from response headers --
  # No manual numbers. limit/remaining/reset come straight from Anthropic's
  # headers, captured as your code makes real calls (see README "Reporting").
  - name: claude
    type: rate_limit
    scheme: anthropic          # anthropic | openai | google | auto
    display_name: Claude       # shown on the card
    display: ring              # ring | bar
    primary: requests          # which window the card highlights (reads as "messages")
    # color: "#d97757"          # optional accent override
    # probe: true               # optionally hit /models each refresh too

  # --- OpenAI / ChatGPT: same live enforced limits --------------------------
  - name: openai
    type: rate_limit
    scheme: openai
    display_name: ChatGPT
    display: ring
    primary: tokens

  # --- Gemini: no live remaining-quota headers; track usage you report -------
  # (Google doesn't expose live per-request remaining limits.)
  - name: gemini
    type: gemini
    display_name: Gemini
    display: bar
    budget:                     # your own allowance, since Google enforces none here
      period: monthly
      limit: 2000000
    # OAuth sign-in (optional): create an OAuth client in Google Cloud console
    # with redirect URI http://127.0.0.1:8799/callback, then:
    # oauth:
    #   preset: google
    #   client_id: "xxxx.apps.googleusercontent.com"
    #   client_secret: "GOCSPX-..."
    #   redirect_port: 8799

  # --- Optional: Anthropic billing/usage view (Admin key, lags minutes) ------
  # - name: claude-spend
  #   type: anthropic_admin
  #   admin_key_env: ANTHROPIC_ADMIN_KEY
  #   budget: { period: monthly, limit: 1000000 }
